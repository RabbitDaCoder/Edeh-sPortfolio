services:
  # ─── Web Service (API) ──────────────────────────────────────────
  - type: web
    name: portfolio-backend
    runtime: docker
    region: oregon
    plan: starter
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    numInstances: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: DATABASE_URL
        sync: false # Set in Render dashboard — use EXTERNAL URL from other account
      - key: REDIS_URL
        sync: false # Manually set — Upstash Redis
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: "15m"
      - key: JWT_REFRESH_EXPIRES_IN
        value: "7d"
      - key: BCRYPT_SALT_ROUNDS
        value: "12"
      - key: CORS_ORIGIN
        sync: false # Set in Render dashboard
      - key: ADMIN_EMAIL
        sync: false
      - key: EMAIL_SERVICE_URL
        sync: false
      - key: EMAIL_SERVICE_API_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
    buildFilter:
      paths:
        - backend/**
        - Dockerfile
        - docker-entrypoint.sh
        - package.json
        - package-lock.json
